# XcodeGen project definition. Regenerate after editing: xcodegen generate
# (run in Terminal at the repo root; requires `brew install xcodegen`).
#
# Org identity: bundle prefix com.usefridgesnap, matching the usefridgesnap.com
# domain (same convention as WindDown's com.winddownapp.app). The name
# FridgeSnap is final as of 2026-07-09.
name: FridgeSnap
options:
  bundleIdPrefix: com.usefridgesnap
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.4.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    # DEVELOPMENT_TEAM comes from ios/Config/Secrets.xcconfig (gitignored)
    # so regenerating the project never loses the signing team.

targets:
  FridgeSnap:
    type: application
    platform: iOS
    sources:
      - path: ios/FridgeSnap
      - path: ios/Config/PrivacyInfo.xcprivacy
        buildPhase: resources
    configFiles:
      Debug: ios/Config/Shared.xcconfig
      Release: ios/Config/Shared.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.usefridgesnap.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: ios/FridgeSnap/Info.plist
      properties:
        CFBundleDisplayName: FridgeSnap
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: FridgeSnap uses your camera to identify the ingredients in your fridge.
        REVENUECAT_API_KEY: $(REVENUECAT_API_KEY)
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    entitlements:
      path: ios/FridgeSnap/FridgeSnap.entitlements
      properties:
        com.apple.developer.applesignin: [Default]
    dependencies:
      - package: RevenueCat
        product: RevenueCat
      - package: Supabase
        product: Supabase
      - package: Lottie
        product: Lottie

  FridgeSnapTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ios/FridgeSnapTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: FridgeSnap

schemes:
  FridgeSnap:
    build:
      targets:
        FridgeSnap: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FridgeSnapTests
    archive:
      config: Release
