# XcodeGen project definition. Regenerate after editing: xcodegen generate
# (run in Terminal at the repo root; requires `brew install xcodegen`).
#
# Org identity: bundle prefix com.lazychefapp (working title; the app name is
# not final). If the owner picks a different name, change bundleIdPrefix and
# PRODUCT_BUNDLE_IDENTIFIER here before any Apple Developer portal setup.
name: LazyChef
options:
  bundleIdPrefix: com.lazychefapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    # DEVELOPMENT_TEAM comes from ios/Config/Secrets.xcconfig (gitignored)
    # so regenerating the project never loses the signing team.

targets:
  LazyChef:
    type: application
    platform: iOS
    sources:
      - path: ios/LazyChef
      - path: ios/Config/PrivacyInfo.xcprivacy
        buildPhase: resources
    configFiles:
      Debug: ios/Config/Shared.xcconfig
      Release: ios/Config/Shared.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lazychefapp.app
    info:
      path: ios/LazyChef/Info.plist
      properties:
        CFBundleDisplayName: LazyChef
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: LazyChef uses your camera to identify the ingredients in your fridge.
        REVENUECAT_API_KEY: $(REVENUECAT_API_KEY)
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    dependencies:
      - package: RevenueCat
        product: RevenueCat

  LazyChefTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ios/LazyChefTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LazyChef

schemes:
  LazyChef:
    build:
      targets:
        LazyChef: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LazyChefTests
    archive:
      config: Release
