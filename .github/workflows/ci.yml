name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ios:
    name: Build and test iOS app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build and test
        run: |
          # Pick whatever iPhone simulator the runner image ships with.
          DEVICE=$(xcrun simctl list devices available | grep -m1 -E '^\s+iPhone' | sed -E 's/^ +(iPhone [^(]+) \(.*/\1/' | sed 's/ *$//')
          echo "Using simulator: $DEVICE"
          xcodebuild test -scheme FridgeSnap -destination "platform=iOS Simulator,name=$DEVICE"
